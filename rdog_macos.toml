# rdog macOS daemon 配置模版
#
# 说明:
# 1. 这个文件适用于 macOS 平台。
# 2. `rdog daemon` 在 macOS 上默认会优先读取 `rdog_macos.toml`。
# 3. 如果你显式传入 `--config`,则以显式路径为准。
# 4. 环境变量 `RDOG_...` 的优先级高于这里的配置。
# 5. 为了避免默认把 shell 暴露到外网,这里把 inbound 绑定到 127.0.0.1。

[daemon]
# outbound 或 inbound 失败后的重试间隔,单位是秒。
retry_seconds = 5

[observation]
# 持久化 observation metadata 和 selector 线索。
# 这不会让短期 `@eN` ref 跨 daemon 重启继续可用。
durable_enabled = true

# 省略 state_dir 时使用平台默认路径。
# 如需固定路径,取消下一行注释并填写目录。
# state_dir = "/Users/you/Library/Application Support/rdog/observations/mac.lab"
retention_observations = 256
retention_bytes = 52428800
persist_values = false
persist_screenshots = false
write_ref_cache = true

[outbound]
# 主动反连模式。
# 需要时改成 true,然后填写目标主机和端口。
enabled = false

# 远端控制端地址。
host = "127.0.0.1"

# 远端控制端端口。
port = 4444

# macOS 推荐:
# - "/bin/zsh"
# - "/bin/bash"
shell = "/bin/zsh"

# endpoint 模式:
# - "interactive": 默认 shell 会话
# - "control": 显式 `@key` / `@paste` / `@script` 控制协议接收端
mode = "interactive"

[inbound]
# 被动监听模式。
# 这里默认开启,但只监听本机回环地址,方便本地验证。
enabled = false

# 建议默认先绑到本机,确认没问题后再改成 0.0.0.0。
host = "0.0.0.0"

# 本地监听端口。
port = 5555

# macOS 推荐:
# - "/bin/zsh"
# - "/bin/bash"
shell = "/bin/zsh"

# inbound 默认仍然是普通 shell。
# 如果你要让 `rdog control` 或 `connect --mode control` 来控制本机,改成 "control"。
mode = "control"

# 环境变量覆盖示例:
# RDOG_DAEMON__RETRY_SECONDS=2
# RDOG_OUTBOUND__ENABLED=true
# RDOG_OUTBOUND__HOST=192.168.1.10
# RDOG_OUTBOUND__PORT=4444
# RDOG_OUTBOUND__MODE=control
# RDOG_INBOUND__HOST=0.0.0.0
# RDOG_INBOUND__MODE=control

[zenoh]
enabled = true
mode = "router"
namespace = "lab"
daemon_name = "mac.lab"
listen_endpoints = [
    # TCP endpoint for control/client join.
    "udp/0.0.0.0:7447",
    # Serial endpoint for ESP32/MCU access.
    # "serial//dev/tty.usbserial-0001#baudrate=112500",
]
request_timeout_ms = 3000
startup_guard_window_ms = 1000

[zenoh.key_input_events]
# 当 daemon 成功执行 `@key` 时,同时向这个 KeyExpr 发布键盘事件。
enabled = true
keyexpr = "rdog/lab/daemon/mac.lab/member/mac.lab/keyinput"

# ----------------------------------------------------------------------------
# 本机 fast path:unixpipe transport(Zenoh 1.8.0 transport_unixpipe feature)
#
# 启用后,daemon 会在 $TMPDIR/rdog-{namespace}-{daemon_name}.pipe 上挂一条
# Zenoh link(`unixpipe` 实际是 named pipe / FIFO,不是 Unix domain socket)。
# `rdog control` 客户端看到同机会自动走 fast path:
#   1. 检查 FIFO 文件是否存在
#   2. 存在 → 把 `unixpipe/{path}` 作为唯一 connect endpoint,跳过 UDP scout
#   3. 不存在 → 走原来的 UDP scout + autodiscover 路径
#
# 收益:同机 `@ping` / `@screenshot` 等高频 round-trip 从 200~500ms 压到 20~80ms
#      (2~5x 提速)。
# 风险:FIFO 残留会阻塞下次启动,rdog daemon 启动时自动 unlink 清理;
#      Windows 平台编译期强制 disabled(Zenoh unixpipe 在 Windows 语义不同)。
#
# 默认:macOS / Linux = true,Windows = false。
# 想关闭显式写: `enabled = false`。
[zenoh.unixpipe]
enabled = true
# 让 `rdog control @ping` / `rdog control @screenshot` 优先选择本配置里的 `mac.lab`。
# 没有这个显式默认身份时,空 target 只能退回到 `$TMPDIR` 里唯一 FIFO 候选扫描。
local_default = true
# ----------------------------------------------------------------------------
